syntax = "proto3";

package tenkai.agent.v1;

// PullPlanRequest identifies the scoped agent asking for its next durable plan.
message PullPlanRequest {
  uint32 protocol_version = 1;
  string agent_id = 2;
  string environment_id = 3;
  string last_seen_plan_id = 4;
}

// PullPlanResponse contains a durable reference, not an ephemeral computed plan.
message PullPlanResponse {
  uint32 protocol_version = 1;
  PlanReference plan = 2;
}

// PlanReference binds agent work to the immutable plan stored by the planner.
message PlanReference {
  string plan_id = 1;
  string environment_id = 2;
  uint32 plan_format_version = 3;
}

// ReportPlanTransitionRequest reports one idempotently identified state change.
message ReportPlanTransitionRequest {
  uint32 protocol_version = 1;
  string plan_id = 2;
  string transition_id = 3;
  PlanState from_state = 4;
  PlanState to_state = 5;
  int64 observed_at_unix_ms = 6;
  string detail = 7;
}

// ReportPlanTransitionResponse returns the planner's authoritative state.
message ReportPlanTransitionResponse {
  uint32 protocol_version = 1;
  string plan_id = 2;
  string transition_id = 3;
  bool accepted = 4;
  PlanState current_state = 5;
  string rejection_reason = 6;
}

enum PlanState {
  PLAN_STATE_UNSPECIFIED = 0;
  PLAN_STATE_COMPUTED = 1;
  PLAN_STATE_RUNNING = 2;
  PLAN_STATE_BLOCKED = 3;
  PLAN_STATE_SUCCEEDED = 4;
  PLAN_STATE_FAILED = 5;
}
